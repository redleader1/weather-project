<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Station</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    crossorigin="anonymous">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid px-4">
      <span class="navbar-brand mb-0 h1">
        <span class="brand-icon">🌤</span> Weather Station
      </span>
      <span class="text-muted small">
        As of <span id="as-of">—</span>
      </span>
    </div>
  </nav>

  <div class="container-fluid px-4 mt-4">

    <!-- ── NWS Alerts ──────────────────────────────────────────────── -->
    <div id="alerts-container"></div>

    <!-- ── Node cards ─────────────────────────────────────────────── -->
    <div class="row" id="node-cards">
      <!-- Populated by weather.js -->
      <div class="col-12 text-center py-5 text-muted" id="loading-msg">
        Loading weather data…
      </div>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <div class="footer-bar text-muted small">
      <span>Page loaded: <span id="last-refresh">—</span></span>
      <span>Auto-refreshes in <span id="countdown">60</span>s</span>
    </div>

  </div>

  <script src="js/weather.js"></script>
</body>
</html>
